apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-green
  namespace: devops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops
      version: green
  template:
    metadata:
      labels:
        app: devops
        version: green
    spec:
      containers:
        - name: app
          image: towmattersdock/devops-app:v1
          env:
            - name: VERSION
              value: "GREEN"
          ports:
            - containerPort: 3000
