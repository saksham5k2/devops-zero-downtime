name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install & Test
        run: |
          npm install
          echo "Tests Passed"

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USER }}/devops-app:${{ github.sha }} .

      - name: Login DockerHub
        run: |
          docker login -u ${{ secrets.DOCKER_USER }} -p ${{ secrets.DOCKER_PASS }}

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USER }}/devops-app:${{ github.sha }}
