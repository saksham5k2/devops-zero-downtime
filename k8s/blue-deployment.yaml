apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-blue
  namespace: devops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops
      version: blue
  template:
    metadata:
      labels:
        app: devops
        version: blue
    spec:
      containers:
        - name: app
          image: devops-app:v1
          imagePullPolicy: Never
          env:
            - name: VERSION
              value: "BLUE"
          ports:
            - containerPort: 3000
